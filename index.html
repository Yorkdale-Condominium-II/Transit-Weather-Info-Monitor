<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorkdale II — Transit &amp; Weather Board</title>
  <style>
    /* ================================================================
       DESIGN TOKENS
       Background: #0A0A0A  — near-black, optimal for OLED/QLED TVs
       TTC Red:    #DA251D  — official TTC brand red
       GO Green:   #256C2F  — official GO Transit / Metrolinx green
       Weather:    #2B85C8  — cool sky blue
       ================================================================ */
    :root {
      --bg:           #0A0A0A;
      --surface:      #141414;
      --surface-2:    #1C1C1C;
      --border:       #2A2A2A;
      --text:         #F0F0F0;
      --muted:        #ACACAC;
      --dim:          #808080;

      --ttc:          #DA251D;
      --ttc-dim:      rgba(218,37,29,0.15);
      --ttc-border:   rgba(218,37,29,0.35);

      --go:           #256C2F;
      --go-dim:       rgba(37,108,47,0.15);
      --go-border:    rgba(37,108,47,0.35);

      --wx:           #2B85C8;
      --wx-dim:       rgba(43,133,200,0.15);
      --wx-border:    rgba(43,133,200,0.35);

      --via:          #005DAA;
      --via-dim:      rgba(0,93,170,0.15);
      --via-border:   rgba(0,93,170,0.35);

      --good:         #22C55E;
      --warn:         #F59E0B;
      --bad:          #EF4444;

      --r:            6px;
      --f-sans:       'Segoe UI', system-ui, -apple-system, sans-serif;
      --f-mono:       'Consolas', 'SF Mono', 'Fira Code', monospace;
    }

    /* ---- Base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-sans);
      line-height: 1.4;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ================================================================
       LAYOUT — designed for 1920×1080 (Full HD) landscape
       ================================================================ */
    .board {
      display: grid;
      grid-template-rows: 72px 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* ---- Header bar ---- */
    .bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .bar-left { display: flex; align-items: center; gap: 0.75rem; }
    .bar-logo {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
    }
    .bar-sep { width: 1px; height: 24px; background: var(--border); }
    .bar-location { font-size: 0.82rem; color: var(--dim); }

    .bar-clock {
      text-align: center;
      font-family: var(--f-mono);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .bar-date {
      font-size: 0.75rem; color: var(--muted);
      text-align: center; margin-top: 0.05rem;
      letter-spacing: 0.03em;
    }

    .bar-right { display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem; }
    .dot-live {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 6px var(--good);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .live-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .updated-label { font-size: 0.68rem; color: var(--dim); font-family: var(--f-mono); font-variant-numeric: tabular-nums; }

    /* ---- Main content ---- */
    .content {
      display: grid;
      grid-template-columns: 310px 1fr 370px;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    /* Center wrapper: TTC shrinks to content, GO fills remaining height */
    .col-center {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
      min-height: 0;
    }
    .col {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    /* Column brand tints + flex sizing for centre stack */
    .col-wx  { background: var(--wx-dim);  }
    .col-ttc { flex: 0 0 auto; background: var(--ttc-dim); }
    .col-go  { flex: 1; min-height: 0; background: var(--go-dim); }
    .col-ic  { background: var(--via-dim); }


    /* ================================================================
       SECTION HEADERS
       ================================================================ */
    .sec-head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sec-stripe { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
    .sec-label {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
    }
    /* Operator logo on the right side of a section header.
       Holds an <img> of the official file with an inline SVG wordmark
       fallback shown only when that file is missing/fails to load. */
    .sec-logo {
      height: clamp(16px, 2.4vh, 22px);
      margin-left: auto; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .op-logo img, .op-logo svg { height: 100%; width: auto; display: block; }
    .op-logo .op-fallback { display: none; }
    .op-logo.failed img { display: none; }
    .op-logo.failed .op-fallback { display: block; }
    .sec-body { padding: clamp(0.6rem, 1.3vh, 1.25rem); flex: 1; overflow-y: auto; scrollbar-width: none; }
    .sec-body::-webkit-scrollbar { display: none; }

    /* ================================================================
       WEATHER COLUMN (left)
       ================================================================ */
    .wx-stripe { background: var(--wx); }

    .wx-current {
      text-align: center;
      padding: clamp(0.75rem, 1.4vh, 1.5rem) 0 clamp(0.6rem, 1.1vh, 1.25rem);
      border-bottom: 1px solid var(--border);
      margin-bottom: clamp(0.5rem, 1vh, 1.25rem);
    }
    .wx-icon { font-size: clamp(2rem, 3.8vh, 3.5rem); line-height: 1; margin-bottom: clamp(0.2rem, 0.5vh, 0.5rem); }
    .wx-temp {
      font-size: clamp(2.5rem, 4.5vh, 4rem); font-weight: 700; line-height: 1;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    .wx-unit { font-size: clamp(1.1rem, 2vh, 1.75rem); font-weight: 400; color: var(--muted); }
    .wx-cond { font-size: clamp(0.75rem, 1.1vh, 0.9rem); color: var(--muted); margin-top: 0.25rem; }
    .wx-feel { font-size: clamp(0.65rem, 0.95vh, 0.78rem); color: var(--dim); margin-top: 0.1rem; }

    .wx-stats { display: flex; flex-direction: column; gap: clamp(0.25rem, 0.6vh, 0.5rem); margin-bottom: clamp(0.5rem, 1vh, 1.25rem); }
    .wx-stat {
      display: flex; justify-content: space-between; align-items: center;
      padding: clamp(0.25rem, 0.55vh, 0.45rem) 0.65rem;
      background: var(--surface); border-radius: var(--r);
      font-size: clamp(0.65rem, 1vh, 0.78rem);
    }
    .wx-stat-label { color: var(--muted); }
    .wx-stat-val { font-family: var(--f-mono); color: var(--text); font-variant-numeric: tabular-nums; }

    .wx-forecast { display: grid; grid-template-columns: repeat(2, 1fr); gap: clamp(0.3rem, 0.6vh, 0.5rem); }
    .fc {
      background: var(--surface); border-radius: var(--r);
      padding: clamp(0.35rem, 0.8vh, 0.65rem) 0.5rem; text-align: center;
      border: 1px solid var(--border);
    }
    .fc.today { border-color: var(--wx-border); background: var(--wx-dim); }
    .fc-day { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); margin-bottom: 0.25rem; }
    .fc.today .fc-day { color: var(--wx); }
    .fc-ico { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .fc-temps { font-family: var(--f-mono); font-size: 0.8rem; color: var(--text); font-variant-numeric: tabular-nums; }
    .fc-lo { color: var(--dim); }
    .fc-rain { font-size: 0.65rem; color: var(--wx); margin-top: 0.2rem; }

    /* ================================================================
       TTC COLUMN (centre)
       ================================================================ */
    .ttc-stripe { background: var(--ttc); }

    /* Subway status */
    .subway-block {
      margin-bottom: clamp(0.5rem, 1vh, 1.25rem);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .subway-title {
      font-size: clamp(0.58rem, 0.8vh, 0.65rem); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: clamp(0.28rem, 0.55vh, 0.5rem) 0.85rem;
      background: var(--surface-2); color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .svc-row {
      display: flex; align-items: center; gap: 0.65rem;
      padding: clamp(0.28rem, 0.7vh, 0.65rem) 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .svc-row:last-child { border-bottom: none; }
    .line-chip {
      font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 3px; white-space: nowrap; letter-spacing: 0.03em;
    }
    .l1 { background: #F8C302; color: #000; }
    .l2 { background: #16A753; color: #fff; }
    .l3 { background: #0082C9; color: #fff; }
    .l4 { background: #B32078; color: #fff; }
    .l5 { background: #F87005; color: #fff; }
    .l6 { background: #8A999A; color: #000; }
    /* GO Transit line chips — each line's official brand colour */
    .go-br { background: #003768; color: #fff; }
    .go-le { background: #EE3124; color: #fff; }
    .go-lw { background: #98002E; color: #fff; }
    .go-ki { background: #00853F; color: #fff; }
    .go-st { background: #794400; color: #fff; }
    .go-rh { background: #009AC7; color: #fff; }
    .go-mi { background: #F58025; color: #fff; }
    .svc-name { font-size: clamp(0.7rem, 1.1vh, 0.82rem); color: var(--text); }
    .svc-sub  { font-size: clamp(0.55rem, 0.75vh, 0.62rem); color: var(--dim); margin-top: 0.1rem; }
    .svc-info { flex: 1; min-width: 0; }
    .svc-status { font-size: clamp(0.6rem, 0.9vh, 0.72rem); font-weight: 600; }
    .s-ok   { color: var(--good); }
    .s-warn { color: var(--warn); }
    .s-bad  { color: var(--bad); }
    .svc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sd-ok   { background: var(--good); }
    .sd-warn { background: var(--warn); }
    .sd-bad  { background: var(--bad); }
    .alerts-scroll { max-height: 18vh; overflow-y: auto; border-top: 1px solid var(--border); }
    .alert-row { align-items: flex-start; }
    .alert-desc { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.4; }

    /* Bus predictions */
    .bus-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.4rem, 0.9vh, 0.75rem);
    }
    .bus-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--ttc);
      border-radius: var(--r);
      padding: clamp(0.5rem, 1vh, 0.85rem);
      overflow: hidden;
    }
    .bus-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
    .bus-num {
      background: var(--ttc); color: #fff;
      font-size: 0.78rem; font-weight: 700;
      padding: 0.18rem 0.55rem; border-radius: 3px;
      font-variant-numeric: tabular-nums;
    }
    .bus-name { font-size: 0.82rem; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bus-stop { font-size: 0.65rem; color: var(--dim); margin-bottom: 0.5rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bus-dir { margin-bottom: 0.3rem; }
    .bus-dir-name { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--dim); margin-bottom: 0.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bus-times { font-family: var(--f-mono); font-size: 0.88rem; font-weight: 600; color: #FF6B5E; font-variant-numeric: tabular-nums; }
    .bus-dist { margin-left: auto; font-size: 0.62rem; color: var(--dim); }
    .bus-unavail {
      font-size: 0.65rem; color: var(--warn); padding: 0.35rem 0.5rem 0.6rem;
    }

    /* ================================================================
       GO TRANSIT COLUMN (right)
       ================================================================ */
    .go-stripe { background: var(--go); }

    .go-terminal {
      display: flex; flex-direction: column; gap: 0.15rem;
      padding: clamp(0.4rem, 0.9vh, 0.85rem);
      background: var(--go-dim);
      border: 1px solid var(--go-border);
      border-radius: var(--r);
      margin-bottom: clamp(0.4rem, 0.9vh, 1.25rem);
    }
    .go-terminal-name { font-size: clamp(0.7rem, 1.1vh, 0.82rem); font-weight: 700; color: var(--go); }
    .go-terminal-sub { font-size: clamp(0.58rem, 0.85vh, 0.68rem); color: var(--muted); }

    /* TTC body splits into two sub-columns: subway left, bus right */
    .col-ttc > .sec-body {
      flex: none;
      padding: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .ttc-split-col {
      background: var(--ttc-dim);
      padding: clamp(0.5rem, 1.1vh, 1rem);
      overflow-y: auto;
      scrollbar-width: none;
    }
    .ttc-split-col::-webkit-scrollbar { display: none; }

    /* GO Transit body splits into two sub-columns */
    .col-go > .sec-body {
      padding: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .go-split-col {
      background: var(--go-dim);
      padding: clamp(0.5rem, 1.1vh, 1rem);
      overflow-y: auto;
      scrollbar-width: none;
    }
    .go-split-col::-webkit-scrollbar { display: none; }

    .go-routes { display: flex; flex-direction: column; gap: clamp(0.25rem, 0.6vh, 0.5rem); margin-bottom: clamp(0.4rem, 0.9vh, 1.25rem); }
    .go-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--go);
      border-radius: 0 var(--r) var(--r) 0;
      padding: clamp(0.35rem, 0.8vh, 0.7rem) 0.85rem;
      display: flex; align-items: center; gap: 0.65rem;
    }
    .go-num {
      background: var(--go); color: #fff;
      font-size: 0.75rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 3px;
      min-width: 2.6rem; text-align: center;
    }
    .go-info { flex: 1; overflow: hidden; }
    .go-dest { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .go-freq { font-size: 0.65rem; color: var(--dim); margin-top: 0.05rem; }

    /* Intercity coaches */
    .ic-card {
      display: flex; align-items: center; gap: 0.65rem;
      padding: clamp(0.28rem, 0.7vh, 0.55rem) 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .ic-card:last-child { border-bottom: none; }
    /* Coach operator logo, held in a fixed-width slot so destinations align */
    .ic-logo-wrap {
      width: clamp(90px, 12vw, 120px); flex-shrink: 0;
      display: flex; align-items: center;
    }
    .ic-logo { height: clamp(20px, 2.9vh, 27px); width: auto; max-width: 100%; display: block; }
    .ic-dest    { font-size: clamp(0.62rem, 0.9vh, 0.72rem); color: var(--muted); line-height: 1.5; }

    /* VIA Rail */
    .via-stripe { background: var(--via); }
    .via-chip { background: var(--via); color: #fff; }
    /* Logo sitting inline inside a subway-title bar */
    .title-logo { height: 15px; width: auto; vertical-align: middle; margin-right: 0.4rem; position: relative; top: -1px; }

    /* Next-departure feature (Union Station timing) */
    .union-after {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.3rem 0.85rem;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
      font-size: clamp(0.58rem, 0.8vh, 0.65rem);
    }
    .ua-label { color: var(--dim); }
    .ua-time  { color: var(--warn); font-family: var(--f-mono); font-weight: 700; font-variant-numeric: tabular-nums; }
    .ua-note  { color: var(--dim); font-size: 0.58rem; margin-left: auto; }
    .next-dep { font-family: var(--f-mono); font-size: clamp(0.6rem, 0.85vh, 0.7rem); color: var(--warn); font-weight: 700; font-variant-numeric: tabular-nums; }
    .leave-dep { font-family: var(--f-mono); font-size: clamp(0.55rem, 0.75vh, 0.62rem); color: var(--dim); font-variant-numeric: tabular-nums; }

    /* ================================================================
       STATUS DOT
       ================================================================ */
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .d-ok   { background: var(--good); }
    .d-warn { background: var(--warn); }
    .d-bad  { background: var(--bad); }

    /* ================================================================
       ERROR / LOADING STATES
       ================================================================ */
    .state-msg { font-size: 0.78rem; color: var(--dim); padding: 1rem 0; }

    /* ================================================================
       SOUND TOGGLE (header)
       ================================================================ */
    .snd-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-left: 0.6rem; cursor: pointer;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 0.28rem 0.55rem;
      font-family: var(--f-sans);
    }
    .snd-btn:hover { color: var(--text); border-color: var(--dim); }
    .snd-btn.on { color: var(--good); border-color: var(--good); }
    .snd-ico { font-size: 0.85rem; line-height: 1; }

    /* ================================================================
       DISRUPTION EMPHASIS — a line that is down / on shuttle buses
       ================================================================ */
    .svc-row.disrupted { background: rgba(239,68,68,0.10); }
    @keyframes flash-alert { 0%,100%{background:rgba(239,68,68,0.10)} 50%{background:rgba(239,68,68,0.26)} }
    .svc-row.just-changed { animation: flash-alert 1s ease-in-out 3; }
    .svc-shuttle {
      font-size: clamp(0.55rem, 0.75vh, 0.62rem); color: var(--warn);
      margin-top: 0.1rem; font-weight: 600;
    }
    .svc-shuttle .bus-ico { margin-right: 0.25rem; }

    /* ================================================================
       TEST PANEL — press "t" to toggle; for simulating disruptions
       ================================================================ */
    .test-panel {
      position: fixed; top: 84px; right: 16px; z-index: 3000;
      width: 320px; display: none;
      background: rgba(18,18,18,0.97);
      border: 1px solid var(--border); border-radius: var(--r);
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
      padding: 0.85rem;
      font-family: var(--f-sans);
    }
    .test-panel.open { display: block; }
    .test-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--warn); margin-bottom: 0.15rem;
    }
    .test-hint { font-size: 0.6rem; color: var(--dim); margin-bottom: 0.7rem; }
    .test-btn {
      display: block; width: 100%; text-align: left; cursor: pointer;
      font-size: 0.72rem; font-family: var(--f-sans); color: var(--text);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 5px; padding: 0.5rem 0.6rem; margin-bottom: 0.4rem;
      line-height: 1.35;
    }
    .test-btn:hover { border-color: var(--dim); }
    .test-btn.active { background: rgba(239,68,68,0.18); border-color: var(--bad); color: #fff; }
    .test-btn small { display: block; color: var(--dim); font-size: 0.62rem; margin-top: 0.1rem; }
    .test-btn.active small { color: rgba(255,255,255,0.75); }
    .test-row { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
    .test-row .test-btn { margin-bottom: 0; text-align: center; }
    .test-util { background: var(--surface); }

    /* ================================================================
       RESPONSIVE (for non-TV screens)
       ================================================================ */
    @media (max-width: 1100px) {
      body { overflow: auto; }
      .board { grid-template-rows: 64px auto; height: auto; }
      .content { grid-template-columns: 1fr; grid-template-rows: auto; background: var(--bg); }

      .col { overflow: visible; }
      .bus-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<div class="board">

  <!-- ============================================================
       TOP BAR
       ============================================================ -->
  <header class="bar">
    <div class="bar-left">
      <span class="bar-logo">120 Varna Drive</span>
      <span class="bar-sep"></span>
      <span class="bar-location">North York, Toronto</span>
    </div>
    <div>
      <div class="bar-clock" id="clock">—:——</div>
      <div class="bar-date" id="dateline">—</div>
    </div>
    <div class="bar-right">
      <span class="dot-live" aria-hidden="true"></span>
      <span class="live-label">Live</span>
      <span class="updated-label" id="updated">—</span>
      <button class="snd-btn" id="snd-btn" type="button" title="Chime when a service status changes">
        <span class="snd-ico" id="snd-ico">🔇</span><span id="snd-txt">Sound off</span>
      </button>
    </div>
  </header>

<script>
(function () {
  'use strict';

  /* 120 Varna Dr / 217 Ranee Ave — corner of Ranee Ave & Varna Dr
     (M6A 0B3). Fallback estimate only: loadTTC() snaps home to the
     TTC "Varna Dr at Ranee Ave" stop coordinates once route config
     loads, so distances are measured from the building's corner. */
  var LAT = 43.7239, LON = -79.4473;

  /* ================================================================
     UNION STATION TIMING
     Walk to Yorkdale Station ~12 min + wait ~3 min + Line 1 south
     Yorkdale → Union (9 stops) ~22 min ≈ 37–40 min total
     ================================================================ */
  var UNION_TRAVEL_MIN = 38;

  /* ---- Format a Date as 12-hour time ---- */
  function fmt12(d) {
    return d.toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',hour12:true});
  }

  /* ---- Next departure catchable from 120 Varna Drive ----
     deps:      [[h,m], …] in 24-hour time
     operDays:  [0..6] Sun=0 / null means every day              */
  function nextCatchableDep(deps, operDays) {
    var catchableBy = new Date(Date.now() + UNION_TRAVEL_MIN * 60 * 1000);
    var best = null;
    for (var offset = 0; offset < 8; offset++) {
      var day = new Date(catchableBy);
      day.setDate(day.getDate() + offset);
      if (operDays && operDays.indexOf(day.getDay()) === -1) continue;
      deps.forEach(function(d) {
        var dt = new Date(day);
        dt.setHours(d[0], d[1], 0, 0);
        if (dt > catchableBy && (!best || dt < best)) best = dt;
      });
      if (best) break;
    }
    return best; /* Date or null */
  }

  /* ---- Format a next-departure result for display ---- */
  function fmtDep(dep) {
    if (!dep) return {next:'—', leave:'—'};
    var now = new Date();
    var prefix = dep.toDateString() === now.toDateString() ? '' :
                 dep.toLocaleDateString('en-CA',{weekday:'short'}) + ' ';
    var leaveBy = new Date(dep.getTime() - UNION_TRAVEL_MIN * 60 * 1000);
    return {next: prefix + fmt12(dep), leave: prefix + fmt12(leaveBy)};
  }

  /* ---- Union-after banner (inserted at top of GO Train section) ---- */
  function unionAfterBanner() {
    var t = fmt12(new Date(Date.now() + UNION_TRAVEL_MIN * 60 * 1000));
    return '<div class="union-after">'
      + '<span class="ua-label">Board at Union after:</span>'
      + '<span class="ua-time">' + t + '</span>'
      + '<span class="ua-note">~' + UNION_TRAVEL_MIN + ' min via Line 1 from Yorkdale</span>'
      + '</div>';
  }

  /* ================================================================
     VIA RAIL — Toronto Union Station schedule (approximate)
     Source: viarail.ca public timetable
     ================================================================ */
  var VIA_ROUTES = [
    {
      code: 'COR', name: 'Corridor — Montréal',
      sub:  'via Kingston · Brockville · (Ottawa)',
      days: 'Daily',
      deps: [[7,0],[9,0],[12,0],[14,0],[16,30],[18,0],[22,30]],
      operDays: null
    },
    {
      code: 'WIN', name: 'Corridor — Windsor',
      sub:  'Oakville · Hamilton · Brantford · London',
      days: 'Daily',
      deps: [[8,0],[12,30],[17,30]],
      operDays: null
    },
    {
      code: 'ML',  name: 'Maple Leaf',
      sub:  'Niagara Falls → New York Penn (with Amtrak)',
      days: 'Daily',
      deps: [[8,28]],
      operDays: null
    },
    {
      code: 'CAN', name: 'The Canadian',
      sub:  'Sudbury · Winnipeg · Edmonton · Vancouver',
      days: 'Tue · Thu · Sat',
      deps: [[22,0]],
      operDays: [2,4,6]   /* Tue=2, Thu=4, Sat=6 */
    }
  ];

  /* ---- WMO codes ---- */
  var WMO = {
    0:{'l':'Clear','i':'☀️'}, 1:{'l':'Mainly clear','i':'🌤️'}, 2:{'l':'Partly cloudy','i':'⛅'},
    3:{'l':'Overcast','i':'☁️'}, 45:{'l':'Foggy','i':'🌫️'}, 48:{'l':'Icy fog','i':'🌫️'},
    51:{'l':'Light drizzle','i':'🌦️'}, 53:{'l':'Drizzle','i':'🌦️'}, 55:{'l':'Heavy drizzle','i':'🌧️'},
    61:{'l':'Light rain','i':'🌧️'}, 63:{'l':'Rain','i':'🌧️'}, 65:{'l':'Heavy rain','i':'🌧️'},
    66:{'l':'Freezing rain','i':'🌨️'}, 71:{'l':'Light snow','i':'🌨️'}, 73:{'l':'Snow','i':'❄️'},
    75:{'l':'Heavy snow','i':'❄️'}, 80:{'l':'Light showers','i':'🌦️'}, 81:{'l':'Showers','i':'🌧️'},
    82:{'l':'Heavy showers','i':'🌧️'}, 95:{'l':'Thunderstorm','i':'⛈️'}, 99:{'l':'Thunderstorm','i':'⛈️'}
  };
  function wmo(c) { return WMO[c] || {l:'—', i:'🌡️'}; }
  function windDir(d) { return ['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]; }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime(iso) {
    try { return new Date(iso + ':00').toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',hour12:true}); }
    catch(e) { return iso; }
  }
  function shortDay(iso) {
    try { return new Date(iso).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'}); }
    catch(e) { return iso; }
  }

  /* ================================================================
     CLOCK
     ================================================================ */
  function tickClock() {
    var now = new Date();
    var cl = document.getElementById('clock');
    var dl = document.getElementById('dateline');
    if (cl) cl.textContent = now.toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
    if (dl) dl.textContent = now.toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
  tickClock();
  setInterval(tickClock, 1000);

  function markUpdated() {
    var el = document.getElementById('updated');
    if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit',hour12:true});
  }

  /* ================================================================
     WEATHER  — Open-Meteo (free, no key, CORS-enabled)
     ================================================================ */
  function loadWeather() {
    var url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + LAT + '&longitude=' + LON
      + '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,precipitation,uv_index'
      + '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset'
      + '&temperature_unit=celsius&wind_speed_unit=kmh&precipitation_unit=mm'
      + '&timezone=America%2FToronto&forecast_days=4';

    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(d) {
        var c = d.current, day = d.daily, cd = wmo(c.weather_code);
        var h = '<div class="wx-current">'
          + '<div class="wx-icon">' + cd.i + '</div>'
          + '<div class="wx-temp">' + Math.round(c.temperature_2m) + '<span class="wx-unit">°C</span></div>'
          + '<div class="wx-cond">' + esc(cd.l) + '</div>'
          + '<div class="wx-feel">Feels like ' + Math.round(c.apparent_temperature) + '°C</div>'
          + '</div>'
          + '<div class="wx-stats">'
          + stat('💧 Humidity', c.relative_humidity_2m + '%')
          + stat('💨 Wind', Math.round(c.wind_speed_10m) + ' km/h ' + windDir(c.wind_direction_10m))
          + stat('☂️ Precip', c.precipitation + ' mm')
          + stat('☀️ UV Index', c.uv_index)
          + stat('🌅 Sunrise', fmtTime(day.sunrise[0]))
          + stat('🌇 Sunset', fmtTime(day.sunset[0]))
          + '</div>'
          + '<div class="wx-forecast">';

        for (var i = 0; i < 4; i++) {
          var fc = wmo(day.weather_code[i]);
          h += '<div class="fc' + (i===0?' today':'') + '">'
            + '<div class="fc-day">' + (i===0 ? 'Today' : esc(shortDay(day.time[i]))) + '</div>'
            + '<div class="fc-ico">' + fc.i + '</div>'
            + '<div class="fc-temps">' + Math.round(day.temperature_2m_max[i]) + '° <span class="fc-lo">/ ' + Math.round(day.temperature_2m_min[i]) + '°</span></div>'
            + '<div class="fc-rain">' + (day.precipitation_sum[i] > 0 ? day.precipitation_sum[i].toFixed(1)+' mm' : '') + '</div>'
            + '</div>';
        }
        h += '</div>';
        document.getElementById('wx-body').innerHTML = h;
      })
      .catch(function() {
        document.getElementById('wx-body').innerHTML = '<div class="state-msg">Weather unavailable — check network</div>';
      });
  }

  function stat(label, val) {
    return '<div class="wx-stat"><span class="wx-stat-label">' + esc(label) + '</span><span class="wx-stat-val">' + esc(val) + '</span></div>';
  }

  /* ================================================================
     TTC — Subway alerts + Bus predictions
     retro.umoiq.com (Umo/NextBus legacy) is deprecated and often
     CORS-restricted. We try both domains and multiple CORS proxies:
       Base URLs: retro.umoiq.com, umoiq.com
       Proxies:   corsproxy.io, allorigins.win, codetabs.com,
                  thingproxy.freeboard.io
     Stops are discovered once via routeConfig and cached for the
     whole session — only predictions are re-fetched every 60 s.
     ================================================================ */
  var TTC_ROUTES = [
    {tag:'52',  name:'Lawrence West'},
    {tag:'109', name:'Ranee'},
    {tag:'29',  name:'Dufferin'}
  ];
  var MAX_STOP_DIST = 250;  /* metres — show bus stops within 250 m of 120 Varna */
  var discoveredStops = null; /* set after first successful routeConfig, never cleared */

  function fetchUMO(command) {
    var bases = [
      'https://retro.umoiq.com/service/publicXMLFeed?a=ttc',
      'https://umoiq.com/service/publicXMLFeed?a=ttc'
    ];
    var proxies = [
      function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
      function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
      function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); },
      function(u){ return 'https://thingproxy.freeboard.io/fetch/' + u; }
    ];
    var attempts = [];
    bases.forEach(function(base) {
      var full = base + command;
      attempts.push(full);
      proxies.forEach(function(pf){ attempts.push(pf(full)); });
    });
    function tryIdx(i) {
      if (i >= attempts.length) return Promise.reject(new Error('all endpoints failed'));
      return fetch(attempts[i])
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function(txt) {
          if (!txt || txt.length < 30) throw new Error('empty');
          var t = txt.trimStart().toLowerCase();
          if (t.startsWith('<!doctype') || t.startsWith('<html')) throw new Error('html error page');
          return txt;
        })
        .catch(function() { return tryIdx(i + 1); });
    }
    return tryIdx(0);
  }

  function haversine(lat1,lon1,lat2,lon2) {
    var R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  function loadTTC() {
    var subwayHtml = buildSubwayHtml();
    if (discoveredStops) { fetchTTCPredictions(subwayHtml, discoveredStops); return; }

    /* First run: fetch full stop lists via routeConfig */
    var cfgPromises = TTC_ROUTES.map(function(route) {
      return fetchUMO('&command=routeConfig&r=' + route.tag + '&verbose')
        .then(function(txt) {
          var xml = new DOMParser().parseFromString(txt,'text/xml');
          var all = [];
          xml.querySelectorAll('stop[lat]').forEach(function(s) {
            all.push({route:route, stopTag:s.getAttribute('tag'), stopTitle:s.getAttribute('title')||'',
                      lat:parseFloat(s.getAttribute('lat')), lon:parseFloat(s.getAttribute('lon'))});
          });
          return all;
        })
        .catch(function(){ return []; });
    });

    Promise.all(cfgPromises).then(function(results) {
      /* Snap home to TTC's surveyed coordinates for the stop at the
         building's corner (Varna Dr at Ranee Ave) */
      var pin = null, pinAlt = null;
      results.forEach(function(arr) {
        arr.forEach(function(s) {
          if (s.route.tag !== '109') return;
          if (/varna\s*dr\.?\s*at\s*ranee/i.test(s.stopTitle)) pin = pin || s;
          else if (/ranee\s*ave\.?\s*at\s*varna/i.test(s.stopTitle)) pinAlt = pinAlt || s;
        });
      });
      var anchor = pin || pinAlt;
      if (anchor) { LAT = anchor.lat; LON = anchor.lon; }

      /* Select stops per route:
         - 109 Ranee: exactly the stops at the Ranee & Varna corner —
           those whose title names both "Varna" and "Ranee" (one on
           Ranee, two on Varna). This excludes the route's other stops
           (e.g. Ranee at Flemington), regardless of distance.
         - other routes: the single nearest in-range stop. */
      var uniqueStops = [];
      var nearest = {};
      results.forEach(function(arr) {
        arr.forEach(function(s) {
          s.dist = Math.round(haversine(LAT, LON, s.lat, s.lon));
          if (s.route.tag === '109') {
            if (/varna/i.test(s.stopTitle) && /ranee/i.test(s.stopTitle)) uniqueStops.push(s);
            return;
          }
          if (s.dist > MAX_STOP_DIST) return;
          if (!nearest[s.route.tag] || s.dist < nearest[s.route.tag].dist) {
            nearest[s.route.tag] = s;
          }
        });
      });
      Object.keys(nearest).forEach(function(k){ uniqueStops.push(nearest[k]); });
      if (!uniqueStops.length) { renderTTCFallback(subwayHtml); return; }
      discoveredStops = uniqueStops;
      fetchTTCPredictions(subwayHtml, discoveredStops);
    }).catch(function(){ renderTTCFallback(subwayHtml); });
  }

  function fetchTTCPredictions(subwayHtml, stops) {
    var stopsParam = stops.map(function(v){ return '&stops='+v.route.tag+'|'+v.stopTag; }).join('');
    fetchUMO('&command=predictionsForMultiStops' + stopsParam)
      .then(function(txt) {
        var xml = new DOMParser().parseFromString(txt,'text/xml');
        renderTTC(subwayHtml, xml, stops);
      })
      .catch(function(){ renderTTCFallback(subwayHtml); });
  }

  function buildSubwayHtml() {
    return '<div class="subway-block" id="subway-status-block">'
      + '<div class="subway-title">Subway &amp; LRT Service Status</div>'
      + '<div class="svc-row"><span class="dot d-ok"></span><span class="line-chip l1">Line 1</span><span class="svc-name">Yonge–University</span><span class="svc-status s-ok">Good service</span></div>'
      + '<div class="svc-row"><span class="dot d-ok"></span><span class="line-chip l2">Line 2</span><span class="svc-name">Bloor–Danforth</span><span class="svc-status s-ok">Good service</span></div>'
      + '<div class="svc-row"><span class="dot d-warn"></span><span class="line-chip l3">Line 3</span><span class="svc-name">Scarborough</span><span class="svc-status s-warn">Bus substitute service</span></div>'
      + '<div class="svc-row"><span class="dot d-ok"></span><span class="line-chip l4">Line 4</span><span class="svc-name">Sheppard</span><span class="svc-status s-ok">Good service</span></div>'
      + '<div class="svc-row"><span class="dot d-ok"></span><span class="line-chip l5">Line 5</span><span class="svc-name">Eglinton Crosstown</span><span class="svc-status s-ok">Good service</span></div>'
      + '<div class="svc-row"><span class="dot d-ok"></span><span class="line-chip l6">Line 6</span><span class="svc-name">Finch West LRT</span><span class="svc-status s-ok">Good service</span></div>'
      + '</div>';
  }

  function renderTTC(subwayHtml, xml, routeInfo) {
    var preds = xml.querySelectorAll('predictions');
    if (!preds.length) { renderTTCFallback(subwayHtml); return; }

    var busHtml = '<div class="bus-grid">';
    preds.forEach(function(pg) {
      var rt = pg.getAttribute('routeTag') || '';
      var rtTitle = pg.getAttribute('routeTitle') || rt;
      var stopTitle = pg.getAttribute('stopTitle') || '';
      var stopTag = pg.getAttribute('stopTag') || '';
      var info = routeInfo.find(function(r){ return r.route.tag === rt && r.stopTag === stopTag; })
             || routeInfo.find(function(r){ return r.route.tag === rt; });
      var dirEls = pg.querySelectorAll('direction');

      busHtml += '<div class="bus-card">'
        + '<div class="bus-head"><span class="bus-num">' + esc(rt) + '</span><span class="bus-name">' + esc(rtTitle) + '</span>'
        + (info ? '<span class="bus-dist">' + info.dist + ' m</span>' : '')
        + '</div>'
        + '<div class="bus-stop">' + esc(stopTitle) + '</div>';

      if (!dirEls.length) {
        busHtml += '<div class="state-msg">No predictions</div>';
      } else {
        dirEls.forEach(function(dir) {
          var dTitle = dir.getAttribute('title') || '';
          var ps = dir.querySelectorAll('prediction');
          var times = [];
          ps.forEach(function(p,i){ if(i<3) times.push(p.getAttribute('minutes')+'m'); });
          busHtml += '<div class="bus-dir">'
            + '<div class="bus-dir-name">' + esc(dTitle) + '</div>'
            + '<div class="bus-times">' + (times.length ? times.join(' · ') : 'No service') + '</div>'
            + '</div>';
        });
      }
      busHtml += '</div>';
    });
    busHtml += '</div>';

    document.getElementById('ttc-body').innerHTML =
      '<div class="ttc-split-col">' + subwayHtml + '</div>'
      + '<div class="ttc-split-col">' + busHtml + '</div>';
  }

  function renderTTCFallback(subwayHtml) {
    /* Show static route/frequency info while real-time is unavailable */
    var staticRoutes = [
      {
        num: '52', name: 'Lawrence West',
        stop: 'Lawrence Ave W at Allen Rd (on-street)',
        dirs: [
          {n:'East → Lawrence Stn (Yonge)', f:'~8–12 min'},
          {n:'West → Humber Summit',         f:'~12–18 min'}
        ]
      },
      {
        num: '109', name: 'Ranee',
        stop: 'Lawrence Ave W at Allen Rd (~2 min walk)',
        dirs: [
          {n:'East → Lawrence Stn (Yonge)',  f:'~10–15 min'},
          {n:'West → Allen Rd loop',          f:'~10–15 min'}
        ]
      },
      {
        num: '29', name: 'Dufferin',
        stop: 'Dufferin St at Wilson Ave (~8 min walk)',
        dirs: [
          {n:'South → Dufferin Stn / Exhibition', f:'~5–8 min peak'},
          {n:'North → Steeles Ave',               f:'~5–8 min peak'}
        ]
      }
    ];
    var html = '<div class="bus-unavail">⚠ Live predictions unavailable — retrying</div>'
      + '<div class="bus-grid">';
    staticRoutes.forEach(function(b) {
      html += '<div class="bus-card">'
        + '<div class="bus-head"><span class="bus-num">' + esc(b.num) + '</span>'
        + '<span class="bus-name">' + esc(b.name) + '</span></div>'
        + '<div class="bus-stop">' + esc(b.stop) + '</div>';
      b.dirs.forEach(function(d) {
        html += '<div class="bus-dir">'
          + '<div class="bus-dir-name">' + esc(d.n) + '</div>'
          + '<div class="bus-times" style="color:var(--dim);font-size:0.78rem">' + esc(d.f) + '</div>'
          + '</div>';
      });
      html += '</div>';
    });

        + '<div class="svc-info"><div class="svc-name">' + esc(line.name) + '</div>'
        + '<div class="svc-sub">' + esc(line.dir) + ' &nbsp;·&nbsp; ' + esc(line.freq) + '</div></div>'
        + '<span class="svc-status ' + (ok ? 's-ok' : 's-warn') + '">'
        + (ok ? 'Good service' : line.active.length + ' alert' + (line.active.length > 1 ? 's' : ''))
        + '</span></div>';
    });

    if (alerts.length) {
      html += '<div class="subway-title" style="padding-top:0.4rem">Active Alerts (' + alerts.length + ')</div>'
        + '<div class="alerts-scroll">';
      alerts.forEach(function(a) {
        var title = a.lineName || a.title || a.header || 'Alert';
        var desc  = a.description || a.body || a.message || '';

          + '<span class="dot d-warn" style="margin-top:0.2rem;flex-shrink:0"></span>'
          + '<div style="flex:1;min-width:0">'
          + '<div class="svc-name">' + esc(title) + (a.sim ? ' <span style="color:var(--warn);font-size:0.58rem;font-weight:700">[TEST]</span>' : '') + '</div>'
          + (desc ? '<div class="alert-desc">' + esc(desc.slice(0,180)) + (desc.length > 180 ? '…' : '') + '</div>' : '')
          + '</div></div>';
      });
      html += '</div>';
    }

    var block = document.getElementById('go-train-status-block');
    if (block) block.innerHTML = html;

    maybeChime('go', sigParts.join('|'), score);
  }

  function loadGOTrainStatus() {
    fetch('https://backend.gotransit.com/v2/api/ServiceAlerts')
      .then(function(r){ return r.json(); })

        lastApiGo = Array.isArray(data) ? data : (Array.isArray(data.alerts) ? data.alerts : []);
        renderGoStatus(lastApiGo);
      })

  /* ================================================================
     OPERATOR LOGOS — simple, self-contained SVG wordmarks in each
     operator's brand colours (evoke the brand, not exact artwork)

  /* ================================================================
     INTERCITY COLUMN — VIA Rail + coaches
     ================================================================ */
  function renderIntercity() {
    var coaches = [
      {
        logo:  'megabus',
        dests: ['Hamilton · London · Ottawa', 'Montréal · Kingston · Niagara']
      },
      {
        logo:  'ontario',
        dests: ['Barrie · Huntsville · North Bay', 'Sudbury · New Liskeard · Timmins']

  /* ================================================================
     SUBWAY ALERTS  — TTC live-alerts API
     ================================================================ */
  /* ================================================================
     CHIME — Web Audio, fully self-contained (no audio files).
     A chime plays only when a service's *status* changes (a new
     disruption appears or one clears) — never on routine prediction
     or weather refreshes. Off by default (browser autoplay policy);
     the header button turns it on.
     ================================================================ */
  var soundOn = false;
  var audioCtx = null;
  var statusState = {
    subway: { first: true, sig: '', score: 0 },
    go:     { first: true, sig: '', score: 0 }
  };

  function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  /* Schedule one tone at an absolute AudioContext time */
  function tone(freq, at, dur, peak) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, at);
    g.gain.exponentialRampToValueAtTime(peak, at + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
    osc.start(at); osc.stop(at + dur + 0.03);
  }
  /* kind: 'alert' (something went down) or 'clear' (recovered).
     A freshly-created context starts suspended, and resume() is async
     — schedule the tones only once it is running, with a small
     lookahead so the first note is never dropped. */
  function chime(kind) {
    initAudio();
    if (!audioCtx) return;
    function play() {
      var clear = kind === 'clear';
      var seq = clear
        ? [[660,0,0.45,0.16],[988,0.16,0.55,0.16]]                 /* rising = good */
        : [[988,0,0.4,0.19],[740,0.17,0.5,0.19],[587,0.34,0.6,0.19]]; /* falling = attention */
      var repeats = clear ? 1 : 3;   /* an alert sounds three times */
      var period = 1.1;              /* spacing between repeats (s) */
      var base = audioCtx.currentTime + 0.06;
      for (var r = 0; r < repeats; r++) {
        var start = base + r * period;
        seq.forEach(function(s){ tone(s[0], start + s[1], s[2], s[3]); });
      }
    }
    if (audioCtx.state === 'suspended') { audioCtx.resume().then(play).catch(play); }
    else { play(); }
  }
  function setSound(on) {
    soundOn = on;
    if (on) initAudio();
    try { localStorage.setItem('ttcSound', on ? '1' : '0'); } catch (e) {}
    var btn = document.getElementById('snd-btn'),
        ico = document.getElementById('snd-ico'),
        txt = document.getElementById('snd-txt');
    if (btn) btn.classList.toggle('on', on);
    if (ico) ico.textContent = on ? '🔔' : '🔇';
    if (txt) txt.textContent = on ? 'Sound on' : 'Sound off';
  }
  /* Compare a status signature; chime on change (after first load) */
  function maybeChime(which, sig, score) {
    var st = statusState[which];
    if (st.first) { st.first = false; st.sig = sig; st.score = score; return false; }
    if (sig === st.sig) return false;
    var oldScore = st.score;
    st.sig = sig; st.score = score;
    /* score up or changed-at-same-level → attention; score down → recovery */
    if (soundOn) chime(score < oldScore ? 'clear' : 'alert');
    return true;
  }

  /* ================================================================
     SIMULATION — test disruptions injected into the live feeds.
     Toggled from the test panel (press "t"). Each scenario is a set
     of synthetic alerts merged with the real API data.
     ================================================================ */
  var simActive = {};
  var SIM_SUBWAY = {
    line1: [{
      sim: true, line: 1, severity: 'bad', busSub: true,
      segment: 'Cedarvale ↔ St George',
      title: 'Line 1 Yonge–University: No service Cedarvale to St George',
      description: 'No subway service between Cedarvale and St George due to a signal problem. Shuttle buses are running in both directions between Cedarvale and St George, stopping at all stations in between. Allow extra travel time.'
    }],
    line2: [{
      sim: true, line: 2, severity: 'warn',
      title: 'Line 2 Bloor–Danforth: Longer wait times',
      description: 'Trains are holding at some stations due to a signal problem. Expect longer waits in both directions.'
    }]
  };
  var SIM_GO = {
    go: [{
      sim: true, severity: 'warn', lineName: 'Barrie',
      title: 'Barrie line: delays up to 30 minutes',
      description: 'A Barrie line trip is delayed up to 30 minutes due to a mechanical issue. Check gotransit.com for the latest.'
    }]
  };
  function simAlerts(map) {
    var out = [];
    Object.keys(simActive).forEach(function(k){ if (map[k]) out = out.concat(map[k]); });
    return out;
  }

  /* ================================================================
     SUBWAY ALERTS  — TTC live-alerts API (+ simulations)
     ================================================================ */
  var SUBWAY_LINES = [
    { num: 1, cls: 'l1', name: 'Yonge–University',   kw: ['line 1','yonge','university'],   busSub: false },
    { num: 2, cls: 'l2', name: 'Bloor–Danforth',     kw: ['line 2','bloor','danforth'],     busSub: false },
    { num: 3, cls: 'l3', name: 'Scarborough',        kw: ['line 3','scarborough'],          busSub: true  },
    { num: 4, cls: 'l4', name: 'Sheppard',           kw: ['line 4','sheppard'],             busSub: false },
    { num: 5, cls: 'l5', name: 'Eglinton Crosstown', kw: ['line 5','eglinton','crosstown'], busSub: false },
    { num: 6, cls: 'l6', name: 'Finch West LRT',     kw: ['line 6','finch west','finch'],   busSub: false }
  ];
  var lastApiSubway = [];

  function renderSubway(apiAlerts) {
    var alerts = simAlerts(SIM_SUBWAY).concat(apiAlerts || []);

    SUBWAY_LINES.forEach(function(line) {
      line.active = alerts.filter(function(a) {
        if (a.line === line.num) return true;
        var t = ((a.title || a.header || '') + ' ' + (a.description || a.body || '')).toLowerCase();
        return line.kw.some(function(k){ return t.indexOf(k) !== -1; });
      });
    });

    var html = '<div class="subway-title">Subway &amp; LRT Service Status</div>';
    var sigParts = [], score = 0;
    SUBWAY_LINES.forEach(function(line) {
      var bad = line.active.some(function(a){ return a.severity === 'bad' || a.busSub; });
      var dotCls, statusCls, statusText, shuttle = '';
      if (bad) {
        dotCls = 'd-bad'; statusCls = 's-bad'; statusText = 'No service';
        var seg = null, hasBus = false;
        line.active.forEach(function(a){ if (a.segment && !seg) seg = a.segment; if (a.busSub) hasBus = true; });
        shuttle = (seg ? seg + ' · ' : '') + (hasBus ? 'Shuttle buses running' : 'Service disruption');
        score += 3;
      } else if (line.busSub) {
        dotCls = 'd-warn'; statusCls = 's-warn'; statusText = 'Bus substitute service';
      } else if (line.active.length) {
        dotCls = 'd-warn'; statusCls = 's-warn';
        statusText = line.active.length + ' alert' + (line.active.length > 1 ? 's' : '');
        score += 1;
      } else {
        dotCls = 'd-ok'; statusCls = 's-ok'; statusText = 'Good service';
      }
      sigParts.push(line.num + ':' + statusText + shuttle);
      html += '<div class="svc-row' + (bad ? ' disrupted' : '') + '">'
        + '<span class="dot ' + dotCls + '"></span>'
        + '<span class="line-chip ' + line.cls + '">Line ' + line.num + '</span>'
        + '<div class="svc-info"><div class="svc-name">' + line.name + '</div>'
        + (shuttle ? '<div class="svc-shuttle"><span class="bus-ico">🚌</span>' + esc(shuttle) + '</div>' : '')
        + '</div>'
        + '<span class="svc-status ' + statusCls + '">' + statusText + '</span></div>';
    });

    if (alerts.length) {
      html += '<div class="subway-title" style="padding-top:0.5rem">Active Alerts (' + alerts.length + ')</div>'
        + '<div class="alerts-scroll">';
      alerts.forEach(function(a) {
        var title = a.title || a.header || 'Alert';
        var desc  = a.description || a.body || a.text || '';
        html += '<div class="svc-row alert-row">'
          + '<span class="dot ' + (a.severity === 'bad' ? 'd-bad' : 'd-warn') + '" style="margin-top:0.2rem;flex-shrink:0"></span>'
          + '<div style="flex:1;min-width:0">'
          + '<div class="svc-name">' + esc(title) + (a.sim ? ' <span style="color:var(--warn);font-size:0.58rem;font-weight:700">[TEST]</span>' : '') + '</div>'
          + (desc ? '<div class="alert-desc">' + esc(desc.slice(0, 180)) + (desc.length > 180 ? '…' : '') + '</div>' : '')
          + '</div></div>';
      });
      html += '</div>';
    }

    var block = document.getElementById('subway-status-block');
    if (block) block.innerHTML = html;

    var changed = maybeChime('subway', sigParts.join('|'), score);
    if (changed && block) {
      Array.prototype.forEach.call(block.querySelectorAll('.svc-row.disrupted'), function(r){ r.classList.add('just-changed'); });
    }
  }

  function loadSubwayAlerts() {
    fetch('https://alerts.ttc.ca/api/alerts/live-alerts')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        lastApiSubway = Array.isArray(data.alerts) ? data.alerts : (Array.isArray(data) ? data : []);
        renderSubway(lastApiSubway);
      })
      .catch(function(){ renderSubway(lastApiSubway); });
  }

  /* ================================================================
     INIT + AUTO-REFRESH
     ================================================================ */
  /* Show the inline SVG wordmark only when an operator's official
     logo file is absent or fails to load — never a broken image. */
  function setupLogoFallbacks(root) {
    var imgs = (root || document).querySelectorAll('.op-logo img');
    Array.prototype.forEach.call(imgs, function(img) {
      function fail() {
        var wrap = img.parentNode;
        if (wrap && wrap.classList) wrap.classList.add('failed');
      }
      img.addEventListener('error', fail);
      if (img.complete && img.naturalWidth === 0) fail();
    });
  }

  /* ================================================================
     TEST PANEL + SOUND CONTROLS
     ================================================================ */
  function toggleSim(key) {
    if (simActive[key]) delete simActive[key]; else simActive[key] = true;
    var btn = document.querySelector('.test-btn[data-sim="' + key + '"]');
    if (btn) btn.classList.toggle('active', !!simActive[key]);
    /* Re-render instantly from cached live data so the sim shows now */
    renderSubway(lastApiSubway);
    renderGoStatus(lastApiGo);
  }

  function wireControls() {
    /* Sound toggle */
    var sndBtn = document.getElementById('snd-btn');
    if (sndBtn) sndBtn.addEventListener('click', function() {
      var next = !soundOn;
      setSound(next);
      if (next) chime('clear');   /* confirmation blip + unlocks audio */
    });
    try { setSound(localStorage.getItem('ttcSound') === '1'); } catch (e) { setSound(false); }

    /* Press "t" to toggle the test panel */
    document.addEventListener('keydown', function(e) {
      if ((e.key === 't' || e.key === 'T') && !e.metaKey && !e.ctrlKey && !e.altKey) {
        var p = document.getElementById('test-panel');
        if (p) p.classList.toggle('open');
      }
    });

    /* Scenario toggles */
    Array.prototype.forEach.call(document.querySelectorAll('.test-btn[data-sim]'), function(b) {
      b.addEventListener('click', function() { toggleSim(b.getAttribute('data-sim')); });
    });

    /* Clear all simulations */
    var clr = document.getElementById('sim-clear');
    if (clr) clr.addEventListener('click', function() {
      simActive = {};
      Array.prototype.forEach.call(document.querySelectorAll('.test-btn[data-sim]'), function(b){ b.classList.remove('active'); });
      renderSubway(lastApiSubway);
      renderGoStatus(lastApiGo);
    });

    /* Preview the chime */
    var tc = document.getElementById('test-chime');
    if (tc) tc.addEventListener('click', function() {
      if (!soundOn) setSound(true);
      chime('alert');
    });
  }

  function refresh() {
    loadWeather();
    loadTTC();
    renderGO();
    renderIntercity();
    markUpdated();
    loadSubwayAlerts();
    loadGOTrainStatus();
  }

  wireControls();
  refresh();
  setupLogoFallbacks();
  setInterval(refresh, 60000);

})();
</script>
